name: qanbie CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: qanbie
          POSTGRES_PASSWORD: qanbie
          POSTGRES_DB: qanbie
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qanbie"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run db:generate
      - run: npm run lint
      - run: npm test
      - run: npm run build
